site_name: Synergy of Steel
site_description: Dokumentation der Allianz Synergy of Steel
site_url: https://synergy-of-steel.github.io/docs/

theme:
  name: material
  icon:
    logo: material/sword-cross
  favicon: assets/favicon.svg
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/theme.css

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: de
          name: Deutsch
          build: true
          default: true
        - locale: en
          name: English
          build: true
          site_description: Documentation for the Synergy of Steel alliance
          nav_translations:
            Start: Home
            Regelwerk: Rulebook
            Prozesse: Processes

nav:
  - Start: index.md
  - Regelwerk: rules.md
  - SRP: srp.md
  - Prozesse: processes.md
